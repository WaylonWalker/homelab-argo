apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gobuilder-strip-hlab-headers
  namespace: go-waylonwalker-com-notes
spec:
  headers:
    customRequestHeaders:
      X-Hlab-User-Id: ""
      X-Hlab-Username: ""
      X-Hlab-Display-Name: ""
      X-Hlab-Email: ""
      X-Hlab-Groups: ""
      X-Hlab-Roles: ""
      X-Hlab-Scopes: ""
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gobuilder
  namespace: go-waylonwalker-com-notes
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    traefik.ingress.kubernetes.io/router.middlewares: go-waylonwalker-com-notes-gobuilder-strip-hlab-headers@kubernetescrd,hlab-auth-hlab-auth-forwardauth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - gobuilder.waylonwalker.com
      secretName: gobuilder-waylonwalker-com-tls
  rules:
    - host: gobuilder.waylonwalker.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-waylonwalker-com-notes-builder-admin
                port:
                  number: 8080
