apiVersion: apps/v1
kind: Deployment
metadata:
  name: posse-party-worker
  namespace: posse-party
  labels:
    app: posse-party-worker
  annotations:
    diun.enable: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posse-party-worker
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: posse-party-worker
      annotations:
        diun.enable: "true"
    spec:
      containers:
        - name: posse-party-worker
          image: ghcr.io/searlsco/posse_party:latest
          imagePullPolicy: Always
          command:
            - ./script/worker
          envFrom:
            - secretRef:
                name: posse-party-secret
            - secretRef:
                name: posse-party-db-credentials
          env:
            - name: RAILS_ENV
              value: production
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: posse-party-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: posse-party-db-credentials
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: posse-party-db-credentials
                  key: database
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@posse-party-db-rw.posse-party.svc.cluster.local:5432/$(DB_NAME)"
