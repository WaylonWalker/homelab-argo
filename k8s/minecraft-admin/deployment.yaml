apiVersion: v1
kind: Namespace
metadata:
  name: minecraft-admin
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minecraft-admin
  namespace: minecraft-admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minecraft-admin-config
  namespace: minecraft-admin
data:
  ALLOWED_NAMESPACES: "kraft,magnet-smp"
  SERVER_CONFIG_PATH: "/app/config/servers.yaml"
  SESSION_HTTPS_ONLY: "true"
  MAX_PVC_SIZE_GI: "20"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minecraft-admin-servers
  namespace: minecraft-admin
data:
  servers.yaml: |
    servers:
      - id: kraft
        name: Kraft
        namespace: kraft
        deployment: kraft
        service: kraft
        container: kraft
        data_volume_name: minecraft-data
        storage_class_name: longhorn-backup
        map_ingress_host: kraft-map.wayl.one
      - id: magnet-smp
        name: Magnet SMP
        namespace: magnet-smp
        deployment: magnet-smp
        service: magnet-smp
        container: magnet-smp
        data_volume_name: minecraft-data
        storage_class_name: longhorn-backup
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-admin
  namespace: minecraft-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-admin
  template:
    metadata:
      labels:
        app: minecraft-admin
    spec:
      serviceAccountName: minecraft-admin
      imagePullSecrets:
        - name: cluster-regcred
      containers:
        - name: app
          image: registry.wayl.one/kraft-admin/app:0.3.7
          imagePullPolicy: Always
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: minecraft-admin-config
            - secretRef:
                name: minecraft-admin-secret
          volumeMounts:
            - name: server-config
              mountPath: /app/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: server-config
          configMap:
            name: minecraft-admin-servers
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-admin
  namespace: minecraft-admin
spec:
  selector:
    app: minecraft-admin
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minecraft-admin
  namespace: minecraft-admin
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: kraft-admin.wayl.one
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minecraft-admin
                port:
                  number: 8000
    - host: kraft.wayl.one
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minecraft-admin
                port:
                  number: 8000
  tls:
    - hosts:
        - kraft-admin.wayl.one
        - kraft.wayl.one
      secretName: kraft-admin-tls
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minecraft-admin
  namespace: kraft
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "persistentvolumeclaims", "services", "events"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minecraft-admin
  namespace: kraft
subjects:
  - kind: ServiceAccount
    name: minecraft-admin
    namespace: minecraft-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: minecraft-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minecraft-admin
  namespace: magnet-smp
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "persistentvolumeclaims", "services", "events"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minecraft-admin
  namespace: magnet-smp
subjects:
  - kind: ServiceAccount
    name: minecraft-admin
    namespace: minecraft-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: minecraft-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minecraft-admin-longhorn
  namespace: longhorn-system
rules:
  - apiGroups: ["longhorn.io"]
    resources: ["volumes", "snapshots"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minecraft-admin-longhorn
  namespace: longhorn-system
subjects:
  - kind: ServiceAccount
    name: minecraft-admin
    namespace: minecraft-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: minecraft-admin-longhorn
