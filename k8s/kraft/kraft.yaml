apiVersion: v1
kind: Namespace
metadata:
  name: kraft
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # not a backup, but uses a longhorn storage class with backup applied
  name: kraft-data-backup
  namespace: kraft
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # not a backup, but uses a longhorn storage class with backup applied
  name: kraft-season2-data
  namespace: kraft
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # not a backup, but uses a longhorn storage class with backup applied
  name: kraft-season3-data
  namespace: kraft
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 10Gi

