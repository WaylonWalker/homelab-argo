apiVersion: v1
kind: Namespace
metadata:
  name: magnet-smp
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # not a backup, but uses a longhorn storage class with backup applied
  name: magnet-smp-data-backup
  namespace: magnet-smp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # not a backup, but uses a longhorn storage class with backup applied
  name: magnet-smp-season1-data
  namespace: magnet-smp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: magnet-smp
  namespace: magnet-smp
spec:
  selector:
    app: magnet-smp
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
      protocol: TCP
  type: ClusterIP
apiVersion: v1
kind: ConfigMap
metadata:
  name: magnet-smp-neoforge-config
  namespace: magnet-smp
data:
  enabled: true
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: magnet-smp-pdb
  namespace: magnet-smp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: magnet-smp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magnet-smp
  namespace: magnet-smp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: magnet-smp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: magnet-smp
      annotations:
        diun.enable: "true"
    spec:
      # nodeSelector:
      #   magnet-smp: "true"
      containers:
        - name: magnet-smp
          image: itzg/minecraft-server
          env:
            - name: SEED
              # kraft 1 seed
              # value: "-4338028305538428199"
              # kraft 2 seed - Hermitcraft Season 11
              # value: "-2654832327628292536"
              # kraft 3 seed - The Pale Mansion
              value: "-7286370756041736131"
            - name: EULA
              value: "true"
            - name: RCON_CMDS_STARTUP
              value: |-
                gamerule keep_inventory true
            - name: TYPE
              value: "NEOFORGE"
            - name: VERSION
              value: "1.21.1"
            - name: MODRINTH_PROJECTS
              value: |
                LNytGWDc:6.0.9
                oWaK0Q19:1.0.3
                gnOpd0sq:1.0.6
                8BmcQJ2H:4.8.4
                ordsPcFz:NrSebcsG
                T9PomCSv:1.0.6
                2AIZDfYo:0.5.2+1.21.1-neoforge
            - name: MOTD
              value: "\u00A79\u00A7lMAGNET SMP\u00A7r \u00A77| \u00A7fSuper strong survival\n\u00A77Pulling players, farms, and shops together"
            - name: ICON
              value: "http://dropper.wayl.one/file/66047fea-00ac-4a5f-a708-c287be1965d7.webp"
            - name: OVERRIDE_ICON
              value: "true"
            # - name: RCON_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: magnet-smp-secret
            #       key: rcon-password
            # - name: ENABLE_RCON
            #   value: "true"
            - name: INIT_MEMORY
              value: "512M"
            - name: MAX_MEMORY
              value: "3G"
            # - name: JVM_XX_OPTS
            #   value: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1"
            - name: BACKUP_ENABLED
              value: "true"
            - name: BACKUP_INTERVAL
              value: "2h"
            - name: BACKUP_RETENTION
              value: "24"
            - name: ONLINE_MODE
              value: "true"
            - name: ENABLE_WHITELIST
              value: "false"
            - name: ENFORCE_WHITELIST
              value: "false"
            - name: OPS
              value: "quadmx08,WyattBubbyLee"
            - name: OVERRIDE_SERVER_PROPERTIES
              value: "true"
            - name: DIFFICULTY
              value: "normal"
            - name: ALLOW_NETHER
              value: "true"
            - name: MAX_PLAYERS
              value: "10"
            - name: ENABLE_COMMAND_BLOCK
              value: "true"
          ports:
            - containerPort: 25565
              protocol: TCP
              name: minecraft
            - containerPort: 25575
              protocol: TCP
              name: rcon
          lifecycle:
            preStop:
              exec:
                command:
                  [
                    "/bin/sh",
                    "-c",
                    "mc-send-to-console save-all && mc-send-to-console say Server is shutting down in 10 seconds && sleep 10 && mc-send-to-console save-all && mc-send-to-console stop",
                  ]
          startupProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 10
            initialDelaySeconds: 15
          livenessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 20
            initialDelaySeconds: 30
          resources:
            requests:
              memory: "3Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "3"
          stdin: true
          tty: true
          volumeMounts:
            - name: minecraft-data
              mountPath: /data
      
      restartPolicy: Always
      volumes:
        - name: minecraft-data
          persistentVolumeClaim:
            claimName: magnet-smp-season1-data
