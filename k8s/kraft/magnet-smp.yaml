apiVersion: v1
kind: Namespace
metadata:
  name: magnet-smp
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # not a backup, but uses a longhorn storage class with backup applied
  name: magnet-smp-data-backup
  namespace: magnet-smp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # not a backup, but uses a longhorn storage class with backup applied
  name: magnet-smp-season1-data
  namespace: magnet-smp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: magnet-smp
  namespace: magnet-smp
spec:
  selector:
    app: magnet-smp
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
      protocol: TCP
    - name: bedrock
      port: 19132
      targetPort: 19132
      protocol: UDP
    - name: bluemap
      port: 8100
      targetPort: 8100
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: magnet-smp-map
  namespace: magnet-smp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: magnet-smp-magnet-smp-map-no-cache@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: magnet-map.wayl.one
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: magnet-smp
                port:
                  number: 8100
  tls:
    - hosts:
        - magnet-map.wayl.one
      secretName: magnet-smp-map-tls
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: magnet-smp-map-no-cache
  namespace: magnet-smp
spec:
  headers:
    customResponseHeaders:
      Cache-Control: "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
      Pragma: "no-cache"
      Expires: "0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: magnet-smp-geyser-config
  namespace: magnet-smp
data:
  config.yml: |
    # Managed from Git so Bedrock/playit settings survive restarts.
    bedrock:
      address: 0.0.0.0
      port: 19132
      clone-remote-port: false
      motd1: "MAGNET SMP | Super strong survival"
      motd2: "Pulling players, farms, and shops together"
      server-name: "magnet-smp"
      compression-level: 6
      broadcast-port: ${CFG_PLAYIT_BEDROCK_PORT}
      enable-proxy-protocol: false
    remote:
      address: 127.0.0.1
      port: 25565
      auth-type: floodgate
      use-proxy-protocol: false
      forward-hostname: false
    floodgate-key-file: key.pem
    saved-user-logins:
      - ThisExampleUsernameShouldBeLongEnoughToNeverBeAnXboxUsername
      - ThisOtherExampleUsernameShouldAlsoBeLongEnough
    pending-authentication-timeout: 120
    command-suggestions: true
    passthrough-motd: true
    passthrough-player-counts: true
    legacy-ping-passthrough: false
    ping-passthrough-interval: 3
    forward-player-ping: false
    max-players: 100
    debug-mode: false
    show-cooldown: title
    show-coordinates: true
    disable-bedrock-scaffolding: false
    emote-offhand-workaround: "disabled"
    cache-images: 0
    allow-custom-skulls: true
    max-visible-custom-skulls: 128
    custom-skull-render-distance: 32
    add-non-bedrock-items: true
    above-bedrock-nether-building: false
    force-resource-packs: true
    xbox-achievements-enabled: false
    log-player-ip-addresses: true
    notify-on-new-bedrock-update: true
    unusable-space-block: minecraft:barrier
    metrics:
      enabled: true
      uuid: 00000000-0000-0000-0000-000000000000
    scoreboard-packet-threshold: 20
    enable-proxy-connections: false
    mtu: 1400
    use-direct-connection: true
    disable-compression: true
    config-version: 4
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: magnet-smp-bluemap-config
  namespace: magnet-smp
data:
  core.conf: |
    # BlueMap needs this acknowledgement before it can download Minecraft assets
    # required for rendering map textures.
    accept-download: true
  webserver.conf: |
    enabled: true
    port: 8100
  webapp.conf: |
    enabled: true
    webroot: "bluemap/web"
    update-settings-file: true
    default-to-flat-view: true
    scripts: [
      "custom/magnet-smp-brand.js"
    ]
  magnet-smp-brand.js: |
    (() => {
      const iconUrl = "https://www.magnet4less.com/mfl75mobile.png";
      const title = "magnet-smp map";

      function upsertMeta(attr, key, value) {
        let el = document.head.querySelector(`meta[${attr}="${key}"]`);
        if (!el) {
          el = document.createElement("meta");
          el.setAttribute(attr, key);
          document.head.appendChild(el);
        }
        el.setAttribute("content", value);
      }

      function upsertIcon(rel) {
        let el = document.head.querySelector(`link[rel="${rel}"]`);
        if (!el) {
          el = document.createElement("link");
          el.setAttribute("rel", rel);
          document.head.appendChild(el);
        }
        el.setAttribute("href", iconUrl);
        el.setAttribute("type", "image/png");
      }

      function updateHead() {
        document.title = title;
        upsertMeta("property", "og:title", title);
        upsertMeta("property", "og:site_name", title);
        upsertMeta("property", "og:image", iconUrl);
        upsertIcon("icon");
        upsertIcon("apple-touch-icon");
      }

      function shouldReplaceImage(img) {
        const src = (img.getAttribute("src") || "").toLowerCase();
        const alt = (img.getAttribute("alt") || "").toLowerCase();
        const cls = (img.getAttribute("class") || "").toLowerCase();
        return src.includes("logo") || alt.includes("bluemap") || cls.includes("logo");
      }

      function updateImages(root = document) {
        root.querySelectorAll("img").forEach((img) => {
          if (!shouldReplaceImage(img)) return;
          if (img.getAttribute("src") === iconUrl) return;
          img.setAttribute("src", iconUrl);
          img.removeAttribute("srcset");
        });
      }

      updateHead();
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => updateImages());
      } else {
        updateImages();
      }

      new MutationObserver((mutations) => {
        for (const mutation of mutations) {
          for (const node of mutation.addedNodes) {
            if (node.nodeType !== Node.ELEMENT_NODE) continue;
            updateImages(node);
          }
        }
      }).observe(document.documentElement, { childList: true, subtree: true });
    })();
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: magnet-smp-pdb
  namespace: magnet-smp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: magnet-smp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magnet-smp
  namespace: magnet-smp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: magnet-smp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: magnet-smp
      annotations:
        diun.enable: "true"
    spec:
      # nodeSelector:
      #   magnet-smp: "true"
      initContainers:
        - name: bluemap-config-sync
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - mkdir -p /data/plugins/BlueMap /data/bluemap/web/custom && cp /config/core.conf /data/plugins/BlueMap/core.conf && cp /config/webserver.conf /data/plugins/BlueMap/webserver.conf && cp /config/webapp.conf /data/plugins/BlueMap/webapp.conf && cp /config/magnet-smp-brand.js /data/bluemap/web/custom/magnet-smp-brand.js && chown -R 1000:1000 /data/plugins/BlueMap /data/bluemap/web/custom
          volumeMounts:
            - name: minecraft-data
              mountPath: /data
            - name: bluemap-config
              mountPath: /config
      containers:
        - name: magnet-smp
          image: itzg/minecraft-server
          env:
            - name: SEED
              # kraft 1 seed
              # value: "-4338028305538428199"
              # kraft 2 seed - Hermitcraft Season 11
              # value: "-2654832327628292536"
              # kraft 3 seed - The Pale Mansion
              value: "-7286370756041736131"
            - name: EULA
              value: "true"
            - name: RCON_CMDS_STARTUP
              value: |-
                gamerule keep_inventory true
            - name: TYPE
              value: "PAPER"
            - name: VERSION
              value: "1.21.11"
            - name: MOTD
              value: "\u00A79\u00A7lMAGNET SMP\u00A7r \u00A77| \u00A7fSuper strong survival\n\u00A77Pulling players, farms, and shops together"
            - name: ICON
              value: "https://www.magnet4less.com/mfl75mobile.png"
            - name: OVERRIDE_ICON
              value: "true"
            - name: PLUGINS
              value: |
                https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
                https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
                https://cdn.modrinth.com/data/swbUV1cr/versions/Vb2ZE8bR/bluemap-5.16-paper.jar
                https://cdn.modrinth.com/data/9tQwxSFr/versions/cNbupZrr/SmartSpawner-1.6.5.jar
                https://cdn.modrinth.com/data/ijC5dDkD/versions/QdShnamC/QuickShop-Hikari-6.2.0.11.jar
                https://cdn.modrinth.com/data/ijC5dDkD/versions/QdShnamC/Addon-BlueMap-6.2.0.11.jar
                https://cdn.modrinth.com/data/HYKaKraK/versions/YNJlvBGJ/packetevents-spigot-2.12.0.jar
                https://cdn.modrinth.com/data/ayRaM8J7/versions/WBBC6arh/VaultUnlocked-2.19.0.jar
                https://cdn.modrinth.com/data/r0FB9U1e/versions/y9uRVTyP/CoinsEngine-2.7.0.jar
                https://cdn.modrinth.com/data/JXxFOmdy/versions/CsbOcaCo/MineXFarmRegen-6.2.0.jar
            - name: COPY_CONFIG_DEST
              value: "/data/plugins/Geyser-Spigot"
            - name: SYNC_SKIP_NEWER_IN_DESTINATION
              value: "false"
            - name: REPLACE_ENV_DURING_SYNC
              value: "true"
            - name: CFG_PLAYIT_BEDROCK_PORT
              value: "19132"
            # - name: RCON_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: magnet-smp-secret
            #       key: rcon-password
            # - name: ENABLE_RCON
            #   value: "true"
            - name: INIT_MEMORY
              value: "512M"
            - name: MAX_MEMORY
              value: "3G"
            # - name: JVM_XX_OPTS
            #   value: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1"
            - name: BACKUP_ENABLED
              value: "true"
            - name: BACKUP_INTERVAL
              value: "2h"
            - name: BACKUP_RETENTION
              value: "24"
            - name: ONLINE_MODE
              value: "true"
            - name: ENFORCE_WHITELIST
              value: "false"
            - name: OPS
              value: "quadmx08,WyattBubbyLee"
            - name: OVERRIDE_SERVER_PROPERTIES
              value: "true"
            - name: DIFFICULTY
              value: "normal"
            - name: ALLOW_NETHER
              value: "true"
            - name: MAX_PLAYERS
              value: "10"
            - name: ENABLE_COMMAND_BLOCK
              value: "true"
          ports:
            - containerPort: 25565
              protocol: TCP
              name: minecraft
            - containerPort: 19132
              protocol: UDP
              name: bedrock
            - containerPort: 8100
              protocol: TCP
              name: bluemap
            - containerPort: 25575
              protocol: TCP
              name: rcon
          lifecycle:
            preStop:
              exec:
                command:
                  [
                    "/bin/sh",
                    "-c",
                    "mc-send-to-console save-all && mc-send-to-console say Server is shutting down in 10 seconds && sleep 10 && mc-send-to-console save-all && mc-send-to-console stop",
                  ]
          startupProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 10
            initialDelaySeconds: 15
          livenessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 20
            initialDelaySeconds: 30
          resources:
            requests:
              memory: "3Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "3"
          stdin: true
          tty: true
          volumeMounts:
            - name: minecraft-data
              mountPath: /data
            - name: geyser-config
              mountPath: /config
              readOnly: true
        - name: playit-agent
          image: ghcr.io/playit-cloud/playit-agent:latest
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: magnet-smp-playit-secret
                  key: SECRET_KEY
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      restartPolicy: Always
      volumes:
        - name: minecraft-data
          persistentVolumeClaim:
            claimName: magnet-smp-season1-data
        - name: geyser-config
          configMap:
            name: magnet-smp-geyser-config
        - name: bluemap-config
          configMap:
            name: magnet-smp-bluemap-config
