apiVersion: v1
kind: Service
metadata:
  labels:
    app: shot-wayl-one
  name: shot-wayl-one
  namespace: shot
spec:
  ports:
    - name: "5000"
      port: 5000
      targetPort: 5000
  selector:
    app: shot-wayl-one
---
apiVersion: v1
kind: Namespace
metadata:
  name: shot
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: shots-redis
  name: shots-redis
  namespace: shot
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: shots-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: shots-redis
  name: shots-redis
  namespace: shot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shots-redis
  template:
    metadata:
      labels:
        app: shots-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shots-redis-ingress
  namespace: shot
spec:
  podSelector:
    matchLabels:
      app: shots-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: shot-wayl-one
  name: shot-wayl-one
  namespace: shot
spec:
  replicas: 4
  selector:
    matchLabels:
      io.kompose.service: shot-wayl-one
  template:
    metadata:
      annotations:
        diun.enable: "true"
      labels:
        app: shot-wayl-one
        io.kompose.service: shot-wayl-one
    spec:
      containers:
        # working versions
        # - image: registry.wayl.one/shot-scraper-api:0.0.6
        # - image: registry.wayl.one/shot-scraper-api:0.0.18
        # - image: registry.wayl.one/shot-scraper-api:0.0.23
        # - image: registry.wayl.one/shot-scraper-api:0.0.24
        # - image: registry.wayl.one/shot-scraper-api:0.0.26
        # - image: registry.wayl.one/shot-scraper-api:0.0.27
        # - image: registry.wayl.one/shot-scraper-api:0.0.28
        - image: registry.wayl.one/shot-scraper-api:0.0.35
          command:
            - "/bin/bash"
            - "-c"
          args:
            - "uvicorn shot_scraper_api.api.app:app --host 0.0.0.0 --port 5000 --workers 1"
          name: shot-wayl-one
          ports:
            - containerPort: 5000
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "300Mi"
            limits:
              cpu: "1000m"
              memory: "4Gi"
          env:
            - name: ENV
              value: "prod"
            - name: CACHE_DIR
              value: "/cache"
            - name: QUEUE_BACKEND
              value: "redis"
            - name: QUEUE_PROCESSOR_ENABLED
              value: "false"
            - name: REDIS_URL
              value: redis://shots-redis.shot.svc.cluster.local:6379/0
            - name: AWS_ENDPOINT_URL
              value: http://minio.minio.svc.cluster.local:9000
          envFrom:
            - secretRef:
                name: shot-minio-secret
            - secretRef:
                name: shot-secret
          volumeMounts:
            - mountPath: /cache
              name: cache
      imagePullSecrets:
        - name: cluster-regcred
      restartPolicy: Always
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: shot-wayl-one-worker
  name: shot-wayl-one-worker
  namespace: shot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shot-wayl-one-worker
  template:
    metadata:
      labels:
        app: shot-wayl-one-worker
    spec:
      containers:
        - image: registry.wayl.one/shot-scraper-api:0.0.35
          command:
            - "/bin/bash"
            - "-c"
          args:
            - "python -m shot_scraper_api.worker"
          name: shot-wayl-one-worker
          resources:
            requests:
              cpu: "100m"
              memory: "300Mi"
            limits:
              cpu: "1000m"
              memory: "4Gi"
          env:
            - name: ENV
              value: "prod"
            - name: CACHE_DIR
              value: "/cache"
            - name: QUEUE_BACKEND
              value: "redis"
            - name: QUEUE_PROCESSOR_ENABLED
              value: "true"
            - name: REDIS_URL
              value: redis://shots-redis.shot.svc.cluster.local:6379/0
            - name: AWS_ENDPOINT_URL
              value: http://minio.minio.svc.cluster.local:9000
          envFrom:
            - secretRef:
                name: shot-minio-secret
            - secretRef:
                name: shot-secret
          volumeMounts:
            - mountPath: /cache
              name: cache
      imagePullSecrets:
        - name: cluster-regcred
      restartPolicy: Always
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: cache
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shot-wayl-one
  namespace: shot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: shots.wayl.one
      http:
        paths:
          - backend:
              service:
                name: shot-wayl-one
                port:
                  number: 5000
            path: /
            pathType: Prefix
    - host: shots.waylonwalker.com
      http:
        paths:
          - backend:
              service:
                name: shot-wayl-one
                port:
                  number: 5000
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - shots.wayl.one
        - shots.waylonwalker.com
      secretName: shots-cert-tls
