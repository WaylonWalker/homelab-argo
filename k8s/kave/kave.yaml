apiVersion: v1
kind: Namespace
metadata:
  name: kave
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kave-data
  namespace: kave
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kave-server-config
  namespace: kave
data:
  serverconfig.txt: |
    world=/root/.local/share/Terraria/Worlds/wayl-one.wld
    worldname=wayl-one
    autocreate=2
    difficulty=1
    maxplayers=8
    port=7777
    motd=wayl.one kave
    secure=1
---
apiVersion: v1
kind: Service
metadata:
  name: kave
  namespace: kave
spec:
  selector:
    app: kave
  ports:
    - name: kave
      port: 7777
      targetPort: 7777
      protocol: TCP
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kave-pdb
  namespace: kave
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kave
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kave
  namespace: kave
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kave
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kave
      annotations:
        diun.enable: "true"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: kave
          image: ryshe/terraria:latest
          args:
            - -config
            - /config/serverconfig.txt
          ports:
            - containerPort: 7777
              protocol: TCP
              name: kave
          startupProbe:
            tcpSocket:
              port: 7777
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 7777
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7777
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2"
          stdin: true
          tty: true
          volumeMounts:
            - name: kave-data
              mountPath: /root/.local/share/Terraria/Worlds
            - name: kave-server-config
              mountPath: /config
              readOnly: true
        - name: playit-agent
          image: ghcr.io/playit-cloud/playit-agent:latest
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kave-playit-secret
                  key: SECRET_KEY
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      restartPolicy: Always
      volumes:
        - name: kave-data
          persistentVolumeClaim:
            claimName: kave-data
        - name: kave-server-config
          configMap:
            name: kave-server-config
