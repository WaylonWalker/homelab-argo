apiVersion: v1
kind: Service
metadata:
  labels:
    service: dropper-wayl-one
  name: dropper-wayl-one
  namespace: dropper-dev
spec:
  ports:
    - name: "8000"
      port: 8000
      targetPort: 8000
  selector:
    service: dropper-wayl-one
---
apiVersion: v1
kind: Namespace
metadata:
  name: dropper-dev
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: dropper-db-credentials
  namespace: dropper-dev
spec:
  encryptedData:
    database: 
    password: 
    username: 
  template:
    metadata:
      name: dropper-db-credentials
      namespace: dropper-dev
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dropper-db
  namespace: dropper-dev
spec:
  instances: 1
  storage:
    storageClass: longhorn-backup
    size: 5Gi
  bootstrap:
    initdb:
      database: dropper
      owner: dropper
      secret:
        name: dropper-db-credentials
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: dropper-wayl-one
  name: dropper-wayl-one
  namespace: dropper-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      service: dropper-wayl-one
  template:
    metadata:
      labels:
        service: dropper-wayl-one
    spec:
      containers:
        - image: registry.wayl.one/dropper:0.0.34
          imagePullPolicy: IfNotPresent
          name: dropper-wayl-one
          command:
            - "/bin/sh"
            - "-c"
          args:
            - >-
              alembic upgrade head &&
              uvicorn dropper.api.main:app --host 0.0.0.0 --port 8000 --workers 1
          ports:
            - containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 20
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "4Gi"
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: dropper-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dropper-db-credentials
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: dropper-db-credentials
                  key: database
            - name: DROPPER_DATABASE_URL
              value: "postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@dropper-db-rw.dropper-dev.svc.cluster.local:5432/$(DB_NAME)"
            - name: DROPPER_STORAGE_DIR
              value: /data
            - name: DROPPER_CACHE_DIR
              value: /cache
            - name: DROPPER_DEFAULT_MEDIA_VARIANTS
              value: ","
          volumeMounts:
            - mountPath: /data
              name: dropper-data
            - mountPath: /cache
              name: dropper-cache
      volumes:
        - name: dropper-data
          persistentVolumeClaim:
            claimName: dropper-data-rwx
        - name: dropper-cache
          emptyDir: {}
      imagePullSecrets:
        - name: cluster-regcred
      restartPolicy: Always
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dropper-wayl-one
  namespace: dropper-dev
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # traefik.ingress.kubernetes.io/router.middlewares: >
    #   dropper-dev-dropper-ratelimit@kubernetescrd,
spec:
  rules:
    - host: dropper-dev.wayl.one
      http:
        paths:
          - backend:
              service:
                name: dropper-wayl-one
                port:
                  number: 8000
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - dropper.wayl.one
      secretName: dropper-cert-tls
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dropper-data-rwx
  namespace: dropper-dev
spec:
  storageClassName: longhorn-backup
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
---
apiVersion: traefik.io/v1alpha1 # if this errors, try traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: dropper-ratelimit
  namespace: dropper-dev
spec:
  rateLimit:
    # "Fair" traffic per client (per IP by default)
    average: 20 # 20 req/sec average
    burst: 40 # allow short spikes
    period: 1s # (optional, default is 1s)

    # How Traefik groups requests by "client"
    sourceCriterion:
      ipStrategy:
        depth: 2 # useful if you're behind a proxy setting X-Forwarded-For
