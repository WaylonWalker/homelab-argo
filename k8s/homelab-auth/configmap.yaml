apiVersion: v1
kind: ConfigMap
metadata:
  name: hlab-auth-config
  namespace: hlab-auth
data:
  HLAB_AUTH_ENVIRONMENT: production
  HLAB_AUTH_LOG_LEVEL: INFO
  HLAB_AUTH_API_PREFIX: /api/v1
  HLAB_AUTH_REQUEST_ID_HEADER: X-Request-ID
  HLAB_AUTH_HEALTH_CHECK_TIMEOUT_SECONDS: "2.0"
  HLAB_AUTH_RATE_LIMIT_DEFAULT_LIMIT: "60"
  HLAB_AUTH_RATE_LIMIT_WINDOW_SECONDS: "60"
  HLAB_AUTH_RATE_LIMIT_SENSITIVE_LIMIT: "5"
  HLAB_AUTH_RATE_LIMIT_SENSITIVE_WINDOW_SECONDS: "60"
  HLAB_AUTH_WEBAUTHN_RP_ID: auth.wayl.one
  HLAB_AUTH_WEBAUTHN_ALLOWED_ORIGINS: '["https://auth.wayl.one"]'
  HLAB_AUTH_WEBAUTHN_CHALLENGE_TTL_SECONDS: "300"
  HLAB_AUTH_SESSION_COOKIE_NAME: hlab_session
  HLAB_AUTH_SESSION_IDLE_TIMEOUT_DAYS: "30"
  HLAB_AUTH_SESSION_ABSOLUTE_TIMEOUT_DAYS: "90"
  HLAB_AUTH_TRUSTED_PROXY_CIDRS: 10.42.0.0/16
