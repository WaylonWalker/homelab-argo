apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-otel-collector
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.159.1
    helm:
      releaseName: otel-collector
      values: |
        mode: deployment
        replicaCount: 1
        image:
          repository: otel/opentelemetry-collector-contrib
        config:
          exporters:
            otlp/tempo:
              endpoint: tempo.observability.svc.cluster.local:4317
              tls:
                insecure: true
          extensions:
            health_check:
              endpoint: ${env:MY_POD_IP}:13133
          processors:
            batch: {}
            memory_limiter:
              check_interval: 5s
              limit_percentage: 80
              spike_limit_percentage: 25
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: ${env:MY_POD_IP}:4317
                http:
                  endpoint: ${env:MY_POD_IP}:4318
          service:
            telemetry:
              metrics:
                readers:
                  - pull:
                      exporter:
                        prometheus:
                          host: ${env:MY_POD_IP}
                          port: 8888
            extensions:
              - health_check
            pipelines:
              traces:
                receivers:
                  - otlp
                processors:
                  - memory_limiter
                  - batch
                exporters:
                  - otlp/tempo
        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            hostPort: null
            protocol: TCP
            appProtocol: grpc
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            hostPort: null
            protocol: TCP
          jaeger-compact:
            enabled: false
          jaeger-thrift:
            enabled: false
          jaeger-grpc:
            enabled: false
          zipkin:
            enabled: false
          metrics:
            enabled: true
            containerPort: 8888
            servicePort: 8888
            protocol: TCP
        service:
          type: ClusterIP
        serviceMonitor:
          enabled: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
