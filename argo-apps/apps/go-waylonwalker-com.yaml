apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-waylonwalker-com
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/waylonwalker/homelab-argo'
      targetRevision: HEAD
      path: waylonwalker-com/go-waylonwalker-com
    - repoURL: 'https://github.com/WaylonWalker/markata-go.git'
      targetRevision: markata/go-perf
      path: helm-chart
      helm:
        values: |
          project_identifier: go-waylonwalker-com
          project_name: waylonwalker-com

          imagePullSecrets: []

          nodeSelector:
            kubernetes.io/hostname: falcon3

          offline:
            enabled: false

          ingress:
            host: go.waylonwalker.com
            ingressClassName: traefik
            tls:
              enabled: true
              secretName: go-waylonwalker-com-tls

          markataEncryption:
            secretName: markata-go-encryption

          aws:
            existingSecretName: ""

          storage:
            source:
              mode: hostPath
              hostPath:
                path: /mnt/main/walkershare/waylon/vaults/go.waylonwalker.com
                type: Directory
            site:
              mode: hostPath
              hostPath:
                path: /mnt/main/walkershare/waylon/sites/go.waylonwalker.com
                type: DirectoryOrCreate
            cache:
              enabled: true
              mode: hostPath
              hostPath:
                path: /mnt/main/walkershare/waylon/cache/go.waylonwalker.com
                type: DirectoryOrCreate
            search:
              storageClassName: local-path
              pvcNameSuffix: "-local"
              size: 5Gi

          build:
            fetchImage:
              tag: sha-8c0a194
            builderImage:
              tag: sha-8c0a194
            fast: true
            successfulJobsHistoryLimit: 20
            failedJobsHistoryLimit: 10
            ttlSecondsAfterFinished: 2592000
            activeDeadlineSeconds: 7200
            cacheDir: /data/cache/xdg
            notify:
              enabled: true
              url: https://ntfy.wayl.one/opencode
            releases:
              keep: 10
            resources:
              requests:
                cpu: 100m
                memory: 4Gi
                ephemeral-storage: 8Gi
              limits:
                memory: 16Gi
                ephemeral-storage: 20Gi
            extraEnv:
              # Concurrency=1 roughly doubled warm full-build time locally.
              # Keep this conservative for memory, but allow enough parallelism
              # to recover most of the cached build speedup.
              - name: MARKATA_GO_CONCURRENCY
                value: "2"
              - name: MARKATA_GO_URL
                value: "https://go.waylonwalker.com"
              - name: MARKATA_GO_SEARCH_ENDPOINT
                value: "https://go.waylonwalker.com/api/search"
              - name: MARKATA_GO_SEARCH_BLEVE_ENDPOINT
                value: "https://go.waylonwalker.com/api/search"

          builderAdmin:
            enabled: true
            fast: true
            mermaidMode: client
            watch:
              enabled: true
              debounce: 2s
            releases:
              keep: 10
            history:
              successfulBuilds: 50
              failedBuilds: 100
              refreshRuns: 100
            buildTimeoutSeconds: 7200
            historyDir: /data/site/.builder-admin
            resources:
              requests:
                cpu: 100m
                memory: 4Gi
                ephemeral-storage: 8Gi
              limits:
                memory: 16Gi
                ephemeral-storage: 20Gi
            refreshTasks:
              - name: reader-update
                every: 30m
                enqueueBuildOnSuccess: true
                args:
                  - --config
                  - /data/source/markata-go.toml
                  - reader
                  - update

          search:
            enabled: true
            image:
              tag: sha-8c0a194
            mode: watch-content

          sourceArchive:
            bucket: unused-in-hostpath-mode
            location: /unused-in-hostpath-mode
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: go-waylonwalker-com-notes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
