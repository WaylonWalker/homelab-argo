apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft-admin
  namespace: argocd
spec:
  project: default
  destination:
    namespace: minecraft-admin
    server: "https://kubernetes.default.svc"
  source:
    path: k8s/minecraft-admin
    repoURL: "https://github.com/waylonwalker/homelab-argo"
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
