apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dozzle
  namespace: argocd
spec:
  project: default
  destination:
    namespace: dozzle
    server: "https://kubernetes.default.svc"
  source:
    path: k8s/dozzle
    repoURL: "https://github.com/waylonwalker/homelab-argo"
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
